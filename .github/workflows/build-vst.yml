name: Build VST

on:
  push:
    tags:
      - 'v*'

env:
  BUILD_TYPE: Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest] #, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Install Linux Dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libasound2-dev libx11-dev libxinerama-dev libxext-dev libfreetype6-dev libglu1-mesa-dev libxcursor-dev libxrender-dev libcurl4-openssl-dev libxrandr-dev libxcomposite-dev
        sudo apt-get install -y libwebkit2gtk-4.1-dev || sudo apt-get install -y libwebkit2gtk-4.0-dev

    - name: Setup Ninja
      uses: seanmiddleditch/gha-setup-ninja@master

    - name: Setup MSVC (Windows native toolkit)
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1

    - name: Configure Compiler Cache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ matrix.os }}-ccache-v1
        max-size: "2G"

    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -G Ninja -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

    - name: Test
      working-directory: ${{github.workspace}}/build
      run: ctest -C ${{env.BUILD_TYPE}}
      
    - name: Install NSIS (Windows Setup)
      if: runner.os == 'Windows'
      run: choco install nsis -y
      
    - name: Build Installer (Windows)
      if: runner.os == 'Windows'
      working-directory: ${{github.workspace}}/build
      run: cpack -G NSIS -C ${{env.BUILD_TYPE}}
      
    - name: Upload Installer (Windows)
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: LiveFlow-Balancer-Installer-Windows
        path: |
          ${{github.workspace}}/build/*.exe
          !${{github.workspace}}/build/*_helper.exe
        if-no-files-found: warn
        
    - name: Upload VST3 Plugin
      uses: actions/upload-artifact@v4
      with:
        name: LiveFlow-Balancer-VST3-${{ runner.os }}
        path: |
          ${{github.workspace}}/build/**/*_artefacts/**/*.vst3
          ${{github.workspace}}/build/**/*_artefacts/**/*.component
        if-no-files-found: warn

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all workflow run artifacts
        uses: actions/download-artifact@v4
        with:
          path: drop

      - name: Prepare Release Assets
        run: |
          mkdir release_assets
          # Extract the Windows Exe installer standalone
          find drop/LiveFlow-Balancer-Installer-Windows -type f -name "*.exe" -exec mv {} release_assets/ \; || true
          
          # Compress macOS and Linux raw plugin bundles (.vst3 / .component are directories on Mac)
          cd drop
          for bundle in LiveFlow-Balancer-VST3-*/; do
            if [ -d "$bundle" ]; then
              bundle_name=$(basename "$bundle")
              zip -r "../release_assets/${bundle_name}.zip" "$bundle"
            fi
          done

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release_assets/*
          generate_release_notes: true

      - name: Upload Installer and update latest.json via Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          EXE_FILE=$(find release_assets -name "*.exe" | head -n 1)
          if [ -n "$EXE_FILE" ]; then
            EXE_NAME=$(basename "$EXE_FILE")
            
            # Upload the Executable (Installers)
            aws s3 cp "$EXE_FILE" "s3://${{ secrets.R2_BUCKET_NAME }}/$EXE_NAME" --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
            aws s3 cp "$EXE_FILE" "s3://${{ secrets.R2_BUCKET_NAME }}/LiveFlow-Balancer-latest-win64.exe" --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
            
            # Generate and upload latest.json reference
            echo "{\"version\":\"$VERSION\", \"file_url\":\"https://liveflow.micro-grav.com/?auto_download=balancer\", \"exe_url\":\"https://download.micro-grav.com/$EXE_NAME\"}" > latest.json
            aws s3 cp latest.json "s3://${{ secrets.R2_BUCKET_NAME }}/latest.json" --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          fi
