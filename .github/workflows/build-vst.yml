name: Build VST

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

env:
  BUILD_TYPE: Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Install Linux Dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libasound2-dev libx11-dev libxinerama-dev libxext-dev libfreetype6-dev libglu1-mesa-dev libxcursor-dev libxrender-dev libcurl4-openssl-dev libxrandr-dev libxcomposite-dev
        sudo apt-get install -y libwebkit2gtk-4.1-dev || sudo apt-get install -y libwebkit2gtk-4.0-dev

    - name: Configure Compiler Cache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ matrix.os }}-ccache-v1

    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

    - name: Test
      working-directory: ${{github.workspace}}/build
      run: ctest -C ${{env.BUILD_TYPE}}
      
    - name: Install NSIS (Windows Setup)
      if: runner.os == 'Windows'
      run: choco install nsis -y
      
    - name: Build Installer (Windows)
      if: runner.os == 'Windows'
      working-directory: ${{github.workspace}}/build
      run: cpack -G NSIS -C ${{env.BUILD_TYPE}}
      
    - name: Upload Installer (Windows)
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: LiveFlow-Balancer-Installer-Windows
        path: ${{github.workspace}}/build/*.exe
        if-no-files-found: warn
        
    - name: Upload VST3 Plugin
      uses: actions/upload-artifact@v4
      with:
        name: LiveFlow-Balancer-VST3-${{ runner.os }}
        path: |
          ${{github.workspace}}/build/**/*_artefacts/**/*.vst3
          ${{github.workspace}}/build/**/*_artefacts/**/*.component
        if-no-files-found: warn

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all workflow run artifacts
        uses: actions/download-artifact@v4
        with:
          path: drop

      - name: Prepare Release Assets
        run: |
          mkdir release_assets
          # Extract the Windows Exe installer standalone
          find drop/LiveFlow-Balancer-Installer-Windows -type f -name "*.exe" -exec mv {} release_assets/ \; || true
          
          # Compress macOS and Linux raw plugin bundles (.vst3 / .component are directories on Mac)
          cd drop
          for bundle in LiveFlow-Balancer-VST3-*/; do
            if [ -d "$bundle" ]; then
              bundle_name=$(basename "$bundle")
              zip -r "../release_assets/${bundle_name}.zip" "$bundle"
            fi
          done

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release_assets/*
          generate_release_notes: true
